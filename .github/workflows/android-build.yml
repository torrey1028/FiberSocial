name: Android Build

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    # The `secrets` context isn't available in step `if:` conditionals — only in
    # `env:`/`with:` — so the release-signing steps below gate on this instead.
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4

      # Fails fast (no JDK/Gradle needed) if a top-level type is declared in both
      # :common and :app — a silent dex-merge collision that crashes at runtime with
      # no compile error (see #155/#156).
      - name: Check for cross-module class collisions
        run: python3 scripts/check_module_collisions.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Write local.properties
        # Secrets go through env + printf %s, never ${{ }} inside the script:
        # the expression is substituted textually before the shell runs, so a
        # secret containing quotes/$/backslashes would corrupt the script (or
        # the written value) silently.
        env:
          RAVELRY_CLIENT_ID: ${{ secrets.RAVELRY_CLIENT_ID }}
          RAVELRY_CLIENT_SECRET: ${{ secrets.RAVELRY_CLIENT_SECRET }}
        run: |
          {
            printf 'sdk.dir=%s\n' "$ANDROID_HOME"
            printf 'ravelry.client_id=%s\n' "$RAVELRY_CLIENT_ID"
            printf 'ravelry.client_secret=%s\n' "$RAVELRY_CLIENT_SECRET"
          } > src/platform/android/local.properties

      # Fail loudly on push builds if either repo secret is missing — otherwise
      # CI goes green while publishing APKs that can't log in (issue #6). Fork
      # PRs legitimately have no secrets and still build (their artifacts just
      # can't log in, with the runtime warning explaining why).
      - name: Verify OAuth credentials are configured
        if: github.event_name == 'push'
        env:
          RAVELRY_CLIENT_ID: ${{ secrets.RAVELRY_CLIENT_ID }}
          RAVELRY_CLIENT_SECRET: ${{ secrets.RAVELRY_CLIENT_SECRET }}
        run: |
          if [ -z "$RAVELRY_CLIENT_ID" ]; then
            echo "::error::RAVELRY_CLIENT_ID repo secret is not set; CI APKs will fail login with invalid_client. Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$RAVELRY_CLIENT_SECRET" ]; then
            echo "::error::RAVELRY_CLIENT_SECRET repo secret is not set; CI APKs will fail login with invalid_client. Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi

      # Same textual-substitution hazard as the step above: env + printf %s,
      # never ${{ }} inside the script. Only runs when the signing secret is
      # configured, so fork PRs (and repos that haven't set it up yet) just
      # skip release signing rather than failing.
      - name: Write release signing config
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > src/platform/android/release.keystore
          {
            printf 'release.store.file=release.keystore\n'
            printf 'release.store.password=%s\n' "$RELEASE_KEYSTORE_PASSWORD"
            printf 'release.key.alias=%s\n' "$RELEASE_KEY_ALIAS"
            printf 'release.key.password=%s\n' "$RELEASE_KEY_PASSWORD"
          } >> src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: src/platform/android
        run: ./gradlew assembleDebug

      - name: Run app unit tests
        working-directory: src/platform/android
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/platform/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build release APK
        if: env.HAS_RELEASE_SIGNING == 'true'
        working-directory: src/platform/android
        run: ./gradlew assembleRelease

      - name: Upload release APK
        if: env.HAS_RELEASE_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: src/platform/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
