name: Android Build

on:
  # `push` only on main (post-merge verification). Branch CI comes from the
  # pull_request trigger below. Listing feat/** here too would fire both events
  # for the same commit on every feat PR, building twice.
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    # The `secrets` context isn't available in step `if:` conditionals — only in
    # `env:`/`with:` — so the release-signing steps below gate on this instead.
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4

      # Fails fast (no JDK/Gradle needed) if a top-level type is declared in both
      # :common and :app — a silent dex-merge collision that crashes at runtime with
      # no compile error (see #155/#156).
      - name: Check for cross-module class collisions
        run: python3 scripts/check_module_collisions.py

      # Fail loudly on post-merge main builds if either repo secret is missing —
      # otherwise CI goes green while publishing APKs that can't log in (issue #6).
      # Deliberately scoped to exactly the runs that inject credentials: PR builds
      # (and fork PRs, which never had secrets) legitimately produce blank-credential
      # artifacts now, with the runtime warning explaining why.
      #
      # Kept here rather than pushed into the shared setup action: this soft
      # main-only assertion and release.yml's hard fail-on-any-missing check are
      # genuinely different policies, and collapsing them into one parameterized
      # step would be more confusing than the duplication it removes.
      - name: Verify OAuth credentials are configured
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RAVELRY_CLIENT_ID: ${{ secrets.RAVELRY_CLIENT_ID }}
          RAVELRY_CLIENT_SECRET: ${{ secrets.RAVELRY_CLIENT_SECRET }}
        run: |
          if [ -z "$RAVELRY_CLIENT_ID" ]; then
            echo "::error::RAVELRY_CLIENT_ID repo secret is not set; CI APKs will fail login with invalid_client. Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$RAVELRY_CLIENT_SECRET" ]; then
            echo "::error::RAVELRY_CLIENT_SECRET repo secret is not set; CI APKs will fail login with invalid_client. Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi

      # JDK + local.properties + Gradle all come from the shared composite action
      # (#274). `secrets` isn't available inside a composite, so each value is
      # passed in explicitly here.
      #
      # This repo is PUBLIC, and Actions artifacts on a public repo are downloadable
      # by anyone — no GitHub account needed. RAVELRY_CLIENT_SECRET becomes a
      # compile-time BuildConfig constant, so it is trivially recoverable from any
      # APK we upload (debug builds aren't even minified). The `secrets` context IS
      # populated for same-repo pull_request runs, so before this gate every PR run
      # published the live secret. The `A && B || ''` ternary resolves to the secret
      # only on post-merge main builds and to an empty string everywhere else.
      # Issue #266.
      #
      # Blank values are a supported state end to end: app/build.gradle.kts defaults
      # both buildConfigFields to "", and AuthAndroidViewModel already logs a
      # blank-credential warning at launch (the path fork PRs have always taken).
      # Consequence: to smoke-test login from a CI artifact, take one from a main
      # run, not a PR run.
      #
      # Passing the keystore secrets unconditionally is safe and is what keeps the
      # soft-skip behavior: when RELEASE_KEYSTORE_BASE64 isn't configured it arrives
      # as "", and the action writes no signing config at all — matching the old
      # `if: env.HAS_RELEASE_SIGNING == 'true'` step gate, which the release build
      # steps below still use.
      - name: Set up Android build environment
        uses: ./.github/actions/setup-android-build
        with:
          ravelry-client-id: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.RAVELRY_CLIENT_ID || '' }}
          ravelry-client-secret: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.RAVELRY_CLIENT_SECRET || '' }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build debug APK
        working-directory: src/platform/android
        run: ./gradlew assembleDebug

      - name: Run app unit tests
        working-directory: src/platform/android
        run: ./gradlew :composeApp:testDebugUnitTest :app:testDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/platform/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build release APK
        if: env.HAS_RELEASE_SIGNING == 'true'
        working-directory: src/platform/android
        run: ./gradlew assembleRelease

      - name: Upload release APK
        if: env.HAS_RELEASE_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: src/platform/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
