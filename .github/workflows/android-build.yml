name: Android Build

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > src/platform/android/local.properties
          echo "ravelry.client_id=${{ secrets.RAVELRY_CLIENT_ID }}" >> src/platform/android/local.properties
          echo "ravelry.client_secret=${{ secrets.RAVELRY_CLIENT_SECRET }}" >> src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: src/platform/android
        run: ./gradlew assembleDebug

      - name: Run app unit tests
        working-directory: src/platform/android
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/platform/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
