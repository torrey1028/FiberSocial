name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  release:
    runs-on: ubuntu-latest
    # Needed to create the GitHub Release via the default GITHUB_TOKEN.
    permissions:
      contents: write

    steps:
      # fetch-depth: 0 (not the shallow default) so `git describe --tags
      # --exact-match` in app/build.gradle.kts can actually resolve this tag.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Unlike android-build.yml's soft-skip-if-missing behavior, this fails
      # loudly: a pushed release tag that silently produces nothing would be
      # far more confusing than one that produces an error.
      - name: Verify release secrets are configured
        env:
          RAVELRY_CLIENT_ID: ${{ secrets.RAVELRY_CLIENT_ID }}
          RAVELRY_CLIENT_SECRET: ${{ secrets.RAVELRY_CLIENT_SECRET }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          missing=""
          [ -z "$RAVELRY_CLIENT_ID" ] && missing="$missing RAVELRY_CLIENT_ID"
          [ -z "$RAVELRY_CLIENT_SECRET" ] && missing="$missing RAVELRY_CLIENT_SECRET"
          [ -z "$RELEASE_KEYSTORE_BASE64" ] && missing="$missing RELEASE_KEYSTORE_BASE64"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repo secret(s):$missing. Add them at Settings > Secrets and variables > Actions before pushing a release tag."
            exit 1
          fi

      # Secrets go through env + printf %s, never ${{ }} inside the script:
      # the expression is substituted textually before the shell runs, so a
      # secret containing quotes/$/backslashes would corrupt the script (or
      # the written value) silently.
      - name: Write local.properties
        env:
          RAVELRY_CLIENT_ID: ${{ secrets.RAVELRY_CLIENT_ID }}
          RAVELRY_CLIENT_SECRET: ${{ secrets.RAVELRY_CLIENT_SECRET }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > src/platform/android/release.keystore
          {
            printf 'sdk.dir=%s\n' "$ANDROID_HOME"
            printf 'ravelry.client_id=%s\n' "$RAVELRY_CLIENT_ID"
            printf 'ravelry.client_secret=%s\n' "$RAVELRY_CLIENT_SECRET"
            printf 'release.store.file=release.keystore\n'
            printf 'release.store.password=%s\n' "$RELEASE_KEYSTORE_PASSWORD"
            printf 'release.key.alias=%s\n' "$RELEASE_KEY_ALIAS"
            printf 'release.key.password=%s\n' "$RELEASE_KEY_PASSWORD"
          } > src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build signed release APK
        working-directory: src/platform/android
        run: ./gradlew assembleRelease

      # $GITHUB_REF_NAME is the tag name (e.g. v1.2.0) for a tag-push event.
      # --generate-notes pulls auto-generated release notes from merged PRs
      # since the previous tag - no separate changelog file/tooling needed.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            src/platform/android/app/build/outputs/apk/release/app-release.apk \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --latest
