name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  release:
    runs-on: ubuntu-latest
    # Serialize release runs (each tag is a distinct ref, so a per-ref group
    # wouldn't help): two tags pushed close together would otherwise race, and
    # whichever job finished *last* would win the `--latest` marker — the exact
    # stale-latest bug the old android-build.yml concurrency comment described.
    concurrency:
      group: release
      cancel-in-progress: false
    # Needed to create the GitHub Release via the default GITHUB_TOKEN.
    permissions:
      contents: write

    steps:
      # fetch-depth: 0 (not the shallow default) so `git describe --tags
      # --exact-match` in app/build.gradle.kts can actually resolve this tag.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # scripts/release.sh enforces tagging from an up-to-date main, but a
      # hand-pushed tag bypasses it entirely — recheck server-side. And when a
      # commit carries more than one release tag, `git describe --exact-match`
      # picks one by its own priority rules, not the tag that triggered this
      # run, so the APK's baked-in version could silently mismatch the release
      # it ships under. Assert both before spending a build.
      - name: Verify tag is on main and resolves unambiguously
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points at $GITHUB_SHA, which is not on origin/main. Cut release tags from main via scripts/release.sh."
            exit 1
          fi
          described="$(git describe --tags --exact-match --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)"
          if [ "$described" != "$GITHUB_REF_NAME" ]; then
            echo "::error::git describe resolves this commit to '${described:-<nothing>}' but the pushed tag is '$GITHUB_REF_NAME', so the built APK's version would not match the release. Delete the conflicting tag(s) on this commit and re-push."
            exit 1
          fi

      # Same fail-fast gate android-build.yml runs: a cross-module top-level
      # class collision compiles fine and only crashes at runtime (#155/#156) —
      # don't let one ship in a public release.
      - name: Check for cross-module class collisions
        run: python3 scripts/check_module_collisions.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Unlike android-build.yml's soft-skip-if-missing behavior, this fails
      # loudly: a pushed release tag that silently produces nothing would be
      # far more confusing than one that produces an error.
      - name: Verify release secrets are configured
        env:
          RAVELRY_CLIENT_ID: ${{ secrets.RAVELRY_CLIENT_ID }}
          RAVELRY_CLIENT_SECRET: ${{ secrets.RAVELRY_CLIENT_SECRET }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          missing=""
          [ -z "$RAVELRY_CLIENT_ID" ] && missing="$missing RAVELRY_CLIENT_ID"
          [ -z "$RAVELRY_CLIENT_SECRET" ] && missing="$missing RAVELRY_CLIENT_SECRET"
          [ -z "$RELEASE_KEYSTORE_BASE64" ] && missing="$missing RELEASE_KEYSTORE_BASE64"
          [ -z "$RELEASE_KEYSTORE_PASSWORD" ] && missing="$missing RELEASE_KEYSTORE_PASSWORD"
          [ -z "$RELEASE_KEY_ALIAS" ] && missing="$missing RELEASE_KEY_ALIAS"
          [ -z "$RELEASE_KEY_PASSWORD" ] && missing="$missing RELEASE_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repo secret(s):$missing. Add them at Settings > Secrets and variables > Actions before pushing a release tag."
            exit 1
          fi

      # Secrets go through env + printf %s, never ${{ }} inside the script:
      # the expression is substituted textually before the shell runs, so a
      # secret containing quotes/$/backslashes would corrupt the script (or
      # the written value) silently.
      - name: Write local.properties
        env:
          RAVELRY_CLIENT_ID: ${{ secrets.RAVELRY_CLIENT_ID }}
          RAVELRY_CLIENT_SECRET: ${{ secrets.RAVELRY_CLIENT_SECRET }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > src/platform/android/release.keystore
          {
            printf 'sdk.dir=%s\n' "$ANDROID_HOME"
            printf 'ravelry.client_id=%s\n' "$RAVELRY_CLIENT_ID"
            printf 'ravelry.client_secret=%s\n' "$RAVELRY_CLIENT_SECRET"
            printf 'release.store.file=release.keystore\n'
            printf 'release.store.password=%s\n' "$RELEASE_KEYSTORE_PASSWORD"
            printf 'release.key.alias=%s\n' "$RELEASE_KEY_ALIAS"
            printf 'release.key.password=%s\n' "$RELEASE_KEY_PASSWORD"
          } > src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Both tasks share the same release signingConfig (see app/build.gradle.kts) and
      # most of the same compile/resource work, so building them in one Gradle
      # invocation avoids a second cold JVM/config pass. The AAB is what Play Console
      # requires for store submissions; the APK stays the direct-download artifact.
      - name: Build signed release APK and AAB
        working-directory: src/platform/android
        run: ./gradlew assembleRelease bundleRelease

      # $GITHUB_REF_NAME is the tag name (e.g. v1.2.0) for a tag-push event.
      # --generate-notes pulls auto-generated release notes from merged PRs
      # since the previous tag - no separate changelog file/tooling needed.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            src/platform/android/app/build/outputs/apk/release/app-release.apk \
            src/platform/android/app/build/outputs/bundle/release/app-release.aab \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --latest
