name: Tests

on:
  # `push` only on main (post-merge verification). Branch CI comes from the
  # pull_request trigger below. Listing feat/** here too would fire both events
  # for the same commit on every feat PR, running the whole suite twice.
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  common-jvm-tests:
    name: Common module JVM tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > src/platform/android/local.properties
          echo "ravelry.client_id=" >> src/platform/android/local.properties
          echo "ravelry.client_secret=" >> src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests and generate coverage report
        working-directory: src/platform/android
        run: ./gradlew :common:jvmCoverageReport

      # On PRs: fetch the XML from the latest successful main run and compare.
      # If no baseline exists yet (first-ever run) the comparison is skipped.
      - name: Download JVM coverage baseline from latest main run
        if: github.event_name == 'pull_request'
        id: baseline-jvm
        run: |
          LATEST=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch main \
            --workflow tests.yml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -n "$LATEST" ]; then
            gh run download "$LATEST" \
              --repo "${{ github.repository }}" \
              --name jvm-coverage-baseline \
              --dir /tmp/jvm-baseline \
            && echo "available=true" >> "$GITHUB_OUTPUT" \
            || echo "Baseline artifact not found, skipping comparison"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compare JVM coverage to baseline
        if: github.event_name == 'pull_request' && steps.baseline-jvm.outputs.available == 'true'
        run: |
          python3 scripts/compare_coverage.py JVM \
            src/common/build/reports/jacoco/jvmCoverageReport/report.xml \
            /tmp/jvm-baseline/report.xml

      - name: Upload JVM coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-coverage-report
          path: src/common/build/reports/jacoco/jvmCoverageReport/html/
          retention-days: 7

      # Publish the XML on main so future PRs can download it as their baseline.
      - name: Publish JVM coverage baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: jvm-coverage-baseline
          path: src/common/build/reports/jacoco/jvmCoverageReport/report.xml
          retention-days: 90

  common-android-unit-tests:
    name: Common module Android unit tests (Robolectric) + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > src/platform/android/local.properties
          echo "ravelry.client_id=" >> src/platform/android/local.properties
          echo "ravelry.client_secret=" >> src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android unit tests and generate coverage report
        working-directory: src/platform/android
        run: ./gradlew :common:createDebugUnitTestCoverageReport

      - name: Download Android coverage baseline from latest main run
        if: github.event_name == 'pull_request'
        id: baseline-android
        run: |
          LATEST=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch main \
            --workflow tests.yml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -n "$LATEST" ]; then
            gh run download "$LATEST" \
              --repo "${{ github.repository }}" \
              --name android-coverage-baseline \
              --dir /tmp/android-baseline \
            && echo "available=true" >> "$GITHUB_OUTPUT" \
            || echo "Baseline artifact not found, skipping comparison"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compare Android coverage to baseline
        if: github.event_name == 'pull_request' && steps.baseline-android.outputs.available == 'true'
        run: |
          python3 scripts/compare_coverage.py Android \
            src/common/build/reports/coverage/test/debug/report.xml \
            /tmp/android-baseline/report.xml

      - name: Upload Android coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-coverage-report
          path: src/common/build/reports/coverage/test/debug/
          retention-days: 7

      - name: Publish Android coverage baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-coverage-baseline
          path: src/common/build/reports/coverage/test/debug/report.xml
          retention-days: 90

  common-ios-tests:
    name: Common module iOS (Kotlin/Native) tests
    # Runs on PRs (and main), despite macOS runners costing ~10x and taking
    # ~6min: it catches Kotlin/Native regressions the ubuntu jobs can't, and
    # in practice has caught real failures before merge — worth the runner time.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Compose Multiplatform 1.11's ui-uikit links against iOS 26 SDK symbols
      # (UIViewLayoutRegion / the UIUtilities framework); the runner's default
      # Xcode 16.4 SDK lacks them and the framework link fails.
      - name: Select Xcode 26
        run: |
          ls -d /Applications/Xcode*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version

      # The build applies AGP even for Native-only tasks (:common is also an
      # Android library), and macOS arm64 runner images don't ship an Android SDK.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 platforms;android-36"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > src/platform/android/local.properties
          echo "ravelry.client_id=" >> src/platform/android/local.properties
          echo "ravelry.client_secret=" >> src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run commonTest on the iOS simulator target
        working-directory: src/platform/android
        run: ./gradlew :common:iosSimulatorArm64Test :composeApp:iosSimulatorArm64Test

      # Proves the framework the Xcode project will consume (#117) still links.
      - name: Assemble the XCFramework
        working-directory: src/platform/android
        run: ./gradlew :common:assembleFiberSocialCommonReleaseXCFramework

      # The real thing: the iOS app + its hosted XCTests (Keychain/NSUserDefaults
      # stores run against a real keychain inside the app host).
      - name: Build the iOS app and run hosted XCTests
        working-directory: src/platform/ios
        run: |
          xcodebuild -project FiberSocial.xcodeproj -scheme FiberSocial \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO test 2>&1 | tail -40
