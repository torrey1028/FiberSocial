name: Tests

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  common-jvm-tests:
    name: Common module JVM tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > src/platform/android/local.properties
          echo "ravelry.client_id=" >> src/platform/android/local.properties
          echo "ravelry.client_secret=" >> src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run common JVM tests
        working-directory: src/platform/android
        run: ./gradlew :common:jvmTest

      - name: Upload JVM test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-results
          path: src/common/build/reports/tests/jvmTest/
          retention-days: 7

  common-android-unit-tests:
    name: Common module Android unit tests (Robolectric)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > src/platform/android/local.properties
          echo "ravelry.client_id=" >> src/platform/android/local.properties
          echo "ravelry.client_secret=" >> src/platform/android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android unit tests
        working-directory: src/platform/android
        run: ./gradlew :common:testDebugUnitTest

      - name: Upload Android unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-results
          path: src/common/build/reports/tests/testDebugUnitTest/
          retention-days: 7
