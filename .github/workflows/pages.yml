name: Pages

on:
  push:
    branches: ["main"]
    paths: ["legal/privacy-policy.html"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment can run at a time; a newer push should win over an
# in-flight older one rather than queue behind it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # The Pages site is just this one file, served as index.html — there's no
      # build step because it's already self-contained static HTML.
      - name: Prepare site
        run: |
          mkdir -p _site
          cp legal/privacy-policy.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
