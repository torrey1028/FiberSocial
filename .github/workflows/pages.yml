name: Pages

on:
  push:
    branches: ["main"]
    paths: ["legal/*.html", "legal/favicon.png"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment can run at a time; a newer push should win over an
# in-flight older one rather than queue behind it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # The Pages site is just the files in legal/, copied as-is — no build step
      # since they're already self-contained static HTML. privacy-policy.html is
      # also copied to index.html so the existing root URL (already submitted to
      # Play Console) keeps working; every other page keeps its own filename
      # (e.g. child-safety-standards.html), and the pages cross-link by relative
      # path, so this must stay a flat copy, not a rename.
      - name: Prepare site
        run: |
          mkdir -p _site
          cp legal/*.html _site/
          cp legal/privacy-policy.html _site/index.html
          cp legal/favicon.png _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
